<!DOCTYPE html>
<html lang="nl-BE">
<head>
    <!-- Google Analytics is loaded consent-gated from src/composables/useCookieConsent.js
         (analytics cookie category) — NOT here, so nothing tracks before consent and
         the third-party script stays off the critical render path. -->

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO fallback (home) -->
    <title>AI & SaaS Development Studio Hasselt | JukeCoding</title>
    <meta
        name="description"
        content="JukeCoding bouwt AI-oplossingen, SaaS-platformen en websites voor bedrijven met ambitie. Development studio in Hasselt, Belgie."
    />
    <meta name="robots" content="index,follow" />

    <!-- Open Graph fallback -->
    <meta property="og:site_name" content="JukeCoding" />
    <meta property="og:locale" content="nl_BE" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="AI & SaaS Development Studio | JukeCoding" />
    <meta
        property="og:description"
        content="JukeCoding bouwt AI-oplossingen, SaaS-platformen en websites voor bedrijven met ambitie. Development studio in Hasselt, Belgie."
    />
    <meta property="og:image" content="https://jukecoding.be/og-image.jpg" />

    <!-- Twitter Card fallback -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="AI & SaaS Development Studio | JukeCoding" />
    <meta name="twitter:description" content="JukeCoding bouwt AI-oplossingen, SaaS-platformen en websites voor bedrijven met ambitie." />
    <meta name="twitter:image" content="https://jukecoding.be/og-image.jpg" />

    <!-- Sitemap discovery -->
    <link rel="sitemap" type="application/xml" href="/sitemap.xml" />

    <!-- Theme color voor mobiel -->
    <meta name="theme-color" content="#ffffff" />

    <!-- Favicons -->
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <!-- Fonts: Geist (body) + Bricolage Grotesque 600 (juke wordmark) — loaded
         non-render-blocking (print→all swap); display=swap avoids FOIT -->
    <link
            href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600&family=Geist:wght@400;500;600;700&display=swap"
            rel="stylesheet"
            media="print"
            onload="this.media='all'"
            crossorigin="anonymous"
    />
    <noscript>
        <link
                href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600&family=Geist:wght@400;500;600;700&display=swap"
                rel="stylesheet"
                crossorigin="anonymous"
        />
    </noscript>

    <!-- Preconnect -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="dns-prefetch" href="https://www.googletagmanager.com">

    <!-- LocalBusiness + Organization Schema -->
    <script type="application/ld+json">
        {
            "@context": "https://schema.org",
            "@type": "LocalBusiness",
            "@id": "https://jukecoding.be/#organization",
            "name": "JukeCoding",
            "alternateName": "Juke Coding",
            "url": "https://jukecoding.be/",
            "logo": {
                "@type": "ImageObject",
                "url": "https://jukecoding.be/logo.png",
                "width": 200,
                "height": 60
            },
            "image": "https://jukecoding.be/og-image.jpg",
            "description": "AI-oplossingen, SaaS-platformen en websites voor bedrijven met ambitie. Development studio in Hasselt, Belgie.",
            "currenciesAccepted": "EUR",
            "paymentAccepted": "Bank transfer, Credit Card",
            "areaServed": [
                {"@type": "State", "name": "Limburg", "addressCountry": "BE"},
                {"@type": "State", "name": "Antwerpen", "addressCountry": "BE"},
                {"@type": "State", "name": "Oost-Vlaanderen", "addressCountry": "BE"},
                {"@type": "State", "name": "West-Vlaanderen", "addressCountry": "BE"},
                {"@type": "State", "name": "Vlaams-Brabant", "addressCountry": "BE"}
            ],
            "address": {
                "@type": "PostalAddress",
                "addressLocality": "Hasselt",
                "addressRegion": "Limburg",
                "postalCode": "3500",
                "addressCountry": "BE"
            },
            "geo": {
                "@type": "GeoCoordinates",
                "latitude": 50.9307,
                "longitude": 5.3378
            },
            "telephone": "+32479131715",
            "email": "contact@jukecoding.be",
            "openingHoursSpecification": [
                {
                    "@type": "OpeningHoursSpecification",
                    "dayOfWeek": ["Monday","Tuesday","Wednesday","Thursday","Friday"],
                    "opens": "09:00",
                    "closes": "18:00"
                }
            ],
            "hasOfferCatalog": {
                "@type": "OfferCatalog",
                "name": "AI, SaaS & Webdesign diensten",
                "itemListElement": [
                    {"@type": "Offer", "itemOffered": {"@type": "Service", "name": "AI-projecten"}},
                    {"@type": "Offer", "itemOffered": {"@type": "Service", "name": "SaaS Development"}},
                    {"@type": "Offer", "itemOffered": {"@type": "Service", "name": "Webdesign"}}
                ]
            },
            "sameAs": [
                "https://www.linkedin.com/company/jukecoding",
                "https://www.instagram.com/jukecoding"
            ]
        }
    </script>

    <!-- WebSite Schema met SearchAction -->
    <script type="application/ld+json">
        {
            "@context": "https://schema.org",
            "@type": "WebSite",
            "@id": "https://jukecoding.be/#website",
            "name": "JukeCoding",
            "url": "https://jukecoding.be/",
            "description": "AI-oplossingen, SaaS-platformen en websites voor bedrijven met ambitie. Development studio in Hasselt, Belgie.",
            "inLanguage": "nl-BE",
            "publisher": {
                "@id": "https://jukecoding.be/#organization"
            }
        }
    </script>
</head>

<body>
<div id="app"></div>
<script type="module" src="/src/main.js"></script>
</body>
</html>
