# Sitemap headers
[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Content-Type = "application/xml; charset=UTF-8"
    Cache-Control = "public, max-age=86400, must-revalidate"
    X-Robots-Tag = "noindex"

# Robots.txt
[[headers]]
  for = "/robots.txt"
  [headers.values]
    Content-Type = "text/plain; charset=UTF-8"
    Cache-Control = "public, max-age=86400"

# Statische assets (JS, CSS, fonts, afbeeldingen) - lange cache
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.webp"
  [headers.values]
    Cache-Control = "public, max-age=2592000, must-revalidate"

[[headers]]
  for = "/afbeeldingensteden/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000, must-revalidate"

# HTML pagina's - kort gecached voor snelle updates
[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    # script-src has NO 'unsafe-inline': the prerendered HTML contains zero
    # executable inline scripts (JSON-LD blocks are inert data; GA4 loads from
    # googletagmanager.com via an external <script src>; Vue hydration runs from
    # the 'self' module bundle). Dropping it means an injected inline <script> or
    # on*= handler is blocked by the browser even if it reaches the DOM — real
    # XSS containment, not just origin locking. style-src keeps 'unsafe-inline'
    # because Vue scoped styles + Vite's inlined critical CSS need it (inline
    # styles can't execute JS). If a future feature adds an inline bootstrap
    # script, give it a nonce rather than re-adding 'unsafe-inline'.
    Content-Security-Policy = "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; form-action 'self'; img-src 'self' data: https:; font-src 'self' https://fonts.gstatic.com data:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; script-src 'self' https://www.googletagmanager.com https://www.google-analytics.com; connect-src 'self' https://api.emailjs.com https://sjgrpqnohfbgevrqtqtp.supabase.co https://www.google-analytics.com https://*.google-analytics.com https://www.googletagmanager.com; upgrade-insecure-requests"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false
  conditions = {Role = ["admin"]}

# Zorg dat statische bestanden niet worden omgeleid
[[redirects]]
  from = "/sitemap.xml"
  to = "/sitemap.xml"
  status = 200
  force = true

[[redirects]]
  from = "/robots.txt"
  to = "/robots.txt"
  status = 200
  force = true

# ── 301-redirects: oude (verwijderde) URLs van vóór de rebrand ──
# Behoudt opgebouwde SEO-autoriteit en voorkomt soft-404's. MOET vóór de
# SPA-fallback staan: Netlify verwerkt regels van boven naar onder, eerste
# match wint. force=true zorgt dat de 301 wint van de catch-all hieronder.

# Offerte-/lead-pagina's → contact (zelfde conversie-intentie)
[[redirects]]
  from = "/offerte-aanvraag"
  to = "/contact"
  status = 301
  force = true
[[redirects]]
  from = "/en/offerte-aanvraag"
  to = "/en/contact"
  status = 301
  force = true
[[redirects]]
  from = "/gratis-seo-scan"
  to = "/contact"
  status = 301
  force = true
[[redirects]]
  from = "/en/gratis-seo-scan"
  to = "/en/contact"
  status = 301
  force = true

# Webdesign + lokale stadspagina's (dienst vervalt na rebrand) → homepage
[[redirects]]
  from = "/webdesign"
  to = "/"
  status = 301
  force = true
[[redirects]]
  from = "/webdesign-*"
  to = "/"
  status = 301
  force = true
[[redirects]]
  from = "/webdesign/*"
  to = "/"
  status = 301
  force = true
[[redirects]]
  from = "/webdesigner-*"
  to = "/"
  status = 301
  force = true
[[redirects]]
  from = "/website-laten-maken-*"
  to = "/"
  status = 301
  force = true
[[redirects]]
  from = "/en/webdesign"
  to = "/en"
  status = 301
  force = true
[[redirects]]
  from = "/en/webdesign-*"
  to = "/en"
  status = 301
  force = true

# Overige verwijderde pagina's → homepage
[[redirects]]
  from = "/website-die-klanten-oplevert"
  to = "/"
  status = 301
  force = true
[[redirects]]
  from = "/locaties"
  to = "/"
  status = 301
  force = true

# Dan pas de SPA fallback
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[build]
command = "rm -rf node_modules package-lock.json && npm install && npm run build"
publish = "dist"
legacy-peer-deps=true

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[[edge_functions]]
  path = "/*"
  function = "bot-guard"
